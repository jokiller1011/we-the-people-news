<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>We the People • Modern News</title>
    <!-- Inter for UI, Tangerine for constitutional cursive logo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&family=Tangerine:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --glass: rgba(255,255,255,0.8);
            --text: #0f172a;
            --text-secondary: #64748b;
            --accent: #2563eb;
            --accent2: #7c3aed;
            --gradient: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            --border: rgba(0,0,0,0.06);
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.03);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);
            --radius-sm: 16px;
            --radius-md: 22px;
            --radius-lg: 28px;
            --transition: 0.3s cubic-bezier(0.22, 0.61, 0.36, 1);
            --font: 'Inter', system-ui, -apple-system, sans-serif;
            --logo-color: #3e2723;
        }

        body.dark {
            --bg: #0f172a;
            --surface: #1e293b;
            --glass: rgba(30,41,59,0.75);
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: rgba(255,255,255,0.08);
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.3);
            --shadow-lg: 0 10px 15px rgba(0,0,0,0.4);
            --logo-color: #d4c5a9;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            transition: background 0.4s, color 0.4s;
            padding-bottom: 80px;
        }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 20px; }

        .header {
            position: sticky;
            top: 0; z-index: 100;
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            background: var(--glass);
            border-bottom: 1px solid var(--border);
            padding: 14px 0;
        }
        .header-inner { display: flex; align-items: center; justify-content: space-between; }
        .logo {
            font-family: 'Tangerine', cursive;
            font-weight: 700;
            font-size: 2.8rem;
            color: var(--logo-color);
            line-height: 1;
            letter-spacing: 0.5px;
        }
        .search-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 0.5rem 1rem 0.5rem 2.4rem;
            width: 260px;
            font-family: var(--font);
            font-size: 0.9rem;
            color: var(--text);
            outline: none;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }
        .search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.2); }
        .search-wrap { position: relative; }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-size: 0.9rem; }
        .theme-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 0.5rem 1rem;
            font-weight: 600; font-size: 0.9rem;
            cursor: pointer;
            color: var(--text);
            display: flex; align-items: center; gap: 0.3rem;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }

        .ticker-bar {
            margin: 16px 0 24px;
            background: var(--surface);
            border-radius: 100px;
            padding: 10px 16px;
            display: flex; align-items: center; gap: 12px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .live-dot {
            width: 10px; height: 10px;
            background: #ef4444;
            border-radius: 50%;
            box-shadow: 0 0 8px #ef4444;
            animation: pulse 1.5s infinite;
            flex-shrink: 0;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .ticker-text { white-space: nowrap; overflow: hidden; flex: 1; }
        .ticker-track {
            display: inline-block;
            animation: ticker 30s linear infinite;
            font-weight: 500; color: var(--text);
        }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .section-content { display: none; }
        .section-content.active-section { display: block; }

        .hero-carousel {
            position: relative; border-radius: var(--radius-lg); overflow: hidden;
            height: 380px; margin-bottom: 28px; box-shadow: var(--shadow-lg);
        }
        .hero-slide { position: absolute; inset: 0; transition: opacity 0.6s; opacity: 0; cursor: pointer; }
        .hero-slide.active { opacity: 1; }
        .hero-img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8); }
        .hero-caption {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 28px; background: linear-gradient(transparent, rgba(0,0,0,0.85)); color: white;
        }
        .hero-source {
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;
            background: rgba(255,255,255,0.15); backdrop-filter: blur(4px);
            padding: 4px 12px; border-radius: 20px; display: inline-block; margin-bottom: 8px;
        }
        .hero-title { font-size: 2rem; font-weight: 800; line-height: 1.2; max-width: 700px; }

        .scroll-row {
            display: flex; gap: 16px; overflow-x: auto; padding-bottom: 12px;
            scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
            scrollbar-width: none; margin-bottom: 20px;
        }
        .scroll-row::-webkit-scrollbar { display: none; }
        .scroll-card {
            flex: 0 0 280px; scroll-snap-align: start;
            background: var(--surface); border-radius: var(--radius-md); overflow: hidden;
            box-shadow: var(--shadow-md); border: 1px solid var(--border);
            transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; perspective: 800px;
        }
        .scroll-card:hover { transform: translateY(-5px) rotateY(2deg) rotateX(1deg); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .scroll-card img { width: 100%; height: 160px; object-fit: cover; transition: 0.3s; }
        .scroll-card:hover img { transform: scale(1.03); }
        .scroll-card-body { padding: 14px; }
        .scroll-card-source { font-size: 0.7rem; text-transform: uppercase; font-weight: 700; color: var(--accent); }
        .scroll-card-title { font-weight: 700; font-size: 1rem; margin: 6px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .article-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px; margin: 24px 0;
        }
        .news-card {
            background: var(--surface); border-radius: var(--radius-md); overflow: hidden;
            box-shadow: var(--shadow-sm); border: 1px solid var(--border);
            transition: var(--transition); cursor: pointer;
            opacity: 0; transform: translateY(20px);
            animation: fadeUp 0.4s ease forwards;
        }
        .news-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-4px); }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        .news-card img { width: 100%; height: 180px; object-fit: cover; }
        .news-card-body { padding: 16px; }
        .news-card-source { font-size: 0.7rem; text-transform: uppercase; font-weight: 700; color: var(--accent); }
        .news-card-title { font-weight: 700; font-size: 1.05rem; margin: 8px 0 4px; }

        .voice-section {
            background: var(--surface); border-radius: var(--radius-lg);
            padding: 24px; box-shadow: var(--shadow-md); border: 1px solid var(--border);
        }
        .voice-header { font-weight: 800; font-size: 1.3rem; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .voice-messages { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; max-height: 200px; overflow-y: auto; }
        .voice-msg {
            background: var(--bg); border-radius: 20px 20px 20px 4px;
            padding: 12px 16px; border: 1px solid var(--border); font-size: 0.9rem;
        }
        .voice-input-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .voice-input-row input, .voice-input-row textarea {
            flex: 1 1 auto; min-width: 150px; padding: 12px 16px;
            border-radius: 100px; border: 1px solid var(--border);
            background: var(--bg); font-family: var(--font); resize: none; color: var(--text);
        }
        .voice-input-row textarea { border-radius: 24px; min-height: 50px; }
        .voice-btn {
            background: var(--gradient); color: white; border: none;
            border-radius: 100px; padding: 12px 24px; font-weight: 700; cursor: pointer;
        }

        .profile-placeholder {
            text-align: center; padding: 60px 20px; color: var(--text-secondary);
        }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--glass); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-around;
            padding: 10px 0 20px; z-index: 100;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            font-size: 0.7rem; font-weight: 600;
            color: var(--text-secondary); cursor: pointer;
            transition: 0.2s; gap: 4px; border: none; background: none;
            font-family: var(--font);
        }
        .nav-item.active { color: var(--accent); }
        .nav-icon { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        @media (max-width: 640px) {
            .hero-carousel { height: 240px; }
            .hero-title { font-size: 1.3rem; }
            .search-box { width: 180px; }
            .logo { font-size: 2.2rem; }
        }
    </style>
</head>
<body class="light">
    <header class="header">
        <div class="container header-inner">
            <div class="logo">We the People</div>
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-box" id="searchInput" placeholder="Search news..." autocomplete="off">
            </div>
            <button class="theme-btn" id="themeToggle">🌙 Dark</button>
        </div>
    </header>

    <main class="container">
        <div class="ticker-bar">
            <div class="live-dot"></div>
            <div class="ticker-text"><div class="ticker-track" id="tickerTrack"></div></div>
        </div>

        <section id="homeSection" class="section-content active-section">
            <div class="hero-carousel" id="heroCarousel"></div>
            <div style="margin-bottom: 20px;">
                <h2 style="font-weight: 800; margin-bottom: 12px;">Top Stories</h2>
                <div class="scroll-row" id="topStoriesScroll"></div>
            </div>
            <h2 style="font-weight: 800; margin-bottom: 12px;">For You</h2>
            <div class="article-grid" id="forYouGrid"></div>
        </section>

        <section id="trendingSection" class="section-content">
            <h2 style="font-weight: 800; margin-bottom: 20px;">Trending Now</h2>
            <div class="article-grid" id="trendingGrid"></div>
        </section>

        <section id="voiceSection" class="section-content">
            <div class="voice-section">
                <div class="voice-header">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19 9a3 3 0 010 6"/><path d="M22 5a7 7 0 010 14"/></svg>
                    People's Voice
                </div>
                <div class="voice-messages" id="voiceMessages"></div>
                <div class="voice-input-row">
                    <input type="text" id="voiceName" placeholder="Your name">
                    <textarea id="voiceMsg" placeholder="Share a local tip..."></textarea>
                    <button class="voice-btn" id="voiceSubmit">Post</button>
                </div>
            </div>
        </section>

        <section id="profileSection" class="section-content">
            <div class="profile-placeholder">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7"/></svg>
                <p style="margin-top: 16px; font-size: 1.2rem;">Your Profile</p>
                <p>Sign in to personalize your news.</p>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" data-tab="home">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1h3a1 1 0 001-1V10"/></svg>
            <span>Home</span>
        </button>
        <button class="nav-item" data-tab="trending">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M17.657 18.657A8 8 0 016.343 7.343S7 10 9 10c2 0 4-3 4-3s1 4 4 4c3 0 2.657 7.657 2.657 7.657z"/></svg>
            <span>Trending</span>
        </button>
        <button class="nav-item" data-tab="voice">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            <span>Voice</span>
        </button>
        <button class="nav-item" data-tab="profile">
            <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7"/></svg>
            <span>Profile</span>
        </button>
    </nav>

    <script>
        (function() {
            // The placeholder will be replaced by the GitHub Actions workflow
            const API_KEY = '__GNEWS_API_KEY__';
            const BASE_URL = 'https://gnews.io/api/v4';

            let allArticles = [];
            let voicePosts = [];
            let heroIndex = 0;

            const sample = [
                { title: "Bipartisan Infrastructure Bill Signed", description: "Historic $1.2T package for roads and bridges.", source:{name:"Civic Times"}, publishedAt: new Date().toISOString(), image:"https://picsum.photos/seed/infra/800/400", url:"#" },
                { title: "Record Turnout at Local Town Hall", description: "Residents demand affordable housing action.", source:{name:"Neighborhood Watch"}, publishedAt: new Date(Date.now()-3600000).toISOString(), image:"https://picsum.photos/seed/townhall/800/400", url:"#" },
                { title: "Tech Hub Brings 2,000 Jobs to Detroit", description: "Innovation center opens in Motor City.", source:{name:"TechCrunch"}, publishedAt: new Date(Date.now()-7200000).toISOString(), image:"https://picsum.photos/seed/tech/800/400", url:"#" },
                { title: "Students Walk Out for Climate Action", description: "Thousands demand bold climate policy.", source:{name:"Youth News"}, publishedAt: new Date(Date.now()-10800000).toISOString(), image:"https://picsum.photos/seed/march/800/400", url:"#" },
                { title: "Urban Garden Breaks Ground Southside", description: "Volunteers transform vacant lots.", source:{name:"Local Herald"}, publishedAt: new Date(Date.now()-14400000).toISOString(), image:"https://picsum.photos/seed/garden/800/400", url:"#" },
                { title: "Voting Rights Bill Introduced", description: "Expands early voting and mail-in access.", source:{name:"Democracy Now"}, publishedAt: new Date(Date.now()-18000000).toISOString(), image:"https://picsum.photos/seed/vote/800/400", url:"#" },
                { title: "Housing Market Cooldown Continues", description: "Prices dip as inventory rises.", source:{name:"RealEstate Today"}, publishedAt: new Date(Date.now()-21600000).toISOString(), image:"https://picsum.photos/seed/housing/800/400", url:"#" },
                { title: "AI Regulation Framework Proposed", description: "White House outlines safety standards.", source:{name:"Wired"}, publishedAt: new Date(Date.now()-25200000).toISOString(), image:"https://picsum.photos/seed/ai/800/400", url:"#" }
            ];

            async function fetchNews() {
                if (!API_KEY || API_KEY === '__GNEWS_API_KEY__') {
                    allArticles = sample;
                } else {
                    try {
                        const res = await fetch(`${BASE_URL}/top-headlines?lang=en&country=us&max=12&apikey=${API_KEY}`);
                        const data = await res.json();
                        if (data.articles && data.articles.length) allArticles = data.articles;
                        else allArticles = sample;
                    } catch (e) { allArticles = sample; }
                }
                renderEverything();
            }

            function filterBySearch(articles) {
                const term = document.getElementById('searchInput').value.toLowerCase();
                if (!term) return articles;
                return articles.filter(a => a.title.toLowerCase().includes(term) || (a.description && a.description.toLowerCase().includes(term)));
            }

            function renderEverything() {
                const filtered = filterBySearch(allArticles);
                renderTicker(filtered);
                renderHero(filtered);
                renderTopStories(filtered);
                renderForYouGrid(filtered);
                renderTrendingGrid(filtered);
            }

            function renderTicker(articles) {
                const headlines = articles.slice(0, 8).map(a => a.title).join('  •  ');
                document.getElementById('tickerTrack').textContent = headlines + '  •  ' + headlines;
            }

            function renderHero(articles) {
                const carousel = document.getElementById('heroCarousel');
                carousel.innerHTML = '';
                const heroArticles = articles.slice(0, 4);
                if (!heroArticles.length) return;
                heroArticles.forEach((a, idx) => {
                    const slide = document.createElement('div');
                    slide.className = 'hero-slide' + (idx === heroIndex ? ' active' : '');
                    slide.innerHTML = `<img class="hero-img" src="${a.image || 'https://picsum.photos/800/400?random='+idx}" onerror="this.src='https://picsum.photos/800/400?random='+idx"><div class="hero-caption"><div class="hero-source">${a.source.name}</div><div class="hero-title">${a.title}</div></div>`;
                    slide.onclick = () => window.open(a.url||'#', '_blank');
                    carousel.appendChild(slide);
                });
                clearInterval(window.heroInterval);
                heroIndex = 0;
                window.heroInterval = setInterval(() => {
                    const slides = document.querySelectorAll('.hero-slide');
                    if (slides.length < 2) return;
                    slides[heroIndex].classList.remove('active');
                    heroIndex = (heroIndex + 1) % slides.length;
                    slides[heroIndex].classList.add('active');
                }, 4500);
            }

            function renderTopStories(articles) {
                const container = document.getElementById('topStoriesScroll');
                container.innerHTML = articles.slice(0, 6).map(a => `
                    <div class="scroll-card" onclick="window.open('${a.url||'#'}','_blank')">
                        <img src="${a.image || 'https://picsum.photos/400/200?random='+Math.random()}" onerror="this.src='https://picsum.photos/400/200?random='+Math.random()">
                        <div class="scroll-card-body">
                            <div class="scroll-card-source">${a.source.name}</div>
                            <div class="scroll-card-title">${a.title}</div>
                        </div>
                    </div>`).join('');
            }

            function renderForYouGrid(articles) {
                const grid = document.getElementById('forYouGrid');
                grid.innerHTML = '';
                articles.slice(2, 10).forEach((a, i) => {
                    const card = document.createElement('div');
                    card.className = 'news-card';
                    card.style.animationDelay = `${i * 0.05}s`;
                    card.innerHTML = `<img src="${a.image || 'https://picsum.photos/400/250?random='+i}" onerror="this.src='https://picsum.photos/400/250?random='+i"><div class="news-card-body"><div class="news-card-source">${a.source.name}</div><div class="news-card-title">${a.title}</div></div>`;
                    card.onclick = () => window.open(a.url||'#', '_blank');
                    grid.appendChild(card);
                });
            }

            function renderTrendingGrid(articles) {
                const grid = document.getElementById('trendingGrid');
                grid.innerHTML = '';
                articles.slice(0, 8).forEach((a, i) => {
                    const card = document.createElement('div');
                    card.className = 'news-card';
                    card.style.animationDelay = `${i * 0.05}s`;
                    card.innerHTML = `<img src="${a.image || 'https://picsum.photos/400/250?random='+i+100}" onerror="this.src='https://picsum.photos/400/250?random='+i+100"><div class="news-card-body"><div class="news-card-source">${a.source.name}</div><div class="news-card-title">${a.title}</div></div>`;
                    card.onclick = () => window.open(a.url||'#', '_blank');
                    grid.appendChild(card);
                });
            }

            function renderVoice() {
                const container = document.getElementById('voiceMessages');
                if (!container) return;
                container.innerHTML = voicePosts.slice().reverse().map(p =>
                    `<div class="voice-msg"><strong>${escapeHtml(p.name)}</strong><br>${escapeHtml(p.msg)}</div>`).join('');
            }
            function escapeHtml(t) { return t.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }

            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tab = btn.getAttribute('data-tab');
                    document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active-section'));
                    document.getElementById(tab + 'Section').classList.add('active-section');
                    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });

            document.getElementById('voiceSubmit').addEventListener('click', () => {
                const name = document.getElementById('voiceName').value.trim() || 'Anonymous';
                const msg = document.getElementById('voiceMsg').value.trim();
                if (!msg) return;
                voicePosts.push({ name, msg });
                document.getElementById('voiceName').value = '';
                document.getElementById('voiceMsg').value = '';
                renderVoice();
            });

            const themeToggle = document.getElementById('themeToggle');
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark');
                const isDark = document.body.classList.contains('dark');
                themeToggle.innerHTML = isDark ? '☀️ Light' : '🌙 Dark';
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            });
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark');
                themeToggle.innerHTML = '☀️ Light';
            }

            document.getElementById('searchInput').addEventListener('input', renderEverything);

            fetchNews();
            renderVoice();
        })();
    </script>
</body>
</html>
